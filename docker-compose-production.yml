version: '3.9'

# ============================================================
# JBAFI - Configuración de Producción
# 7 Contenedores: Sistema completo AFI
# ============================================================

services:
  
  # ============================================================
  # 1. FRONTEND - Interfaz Web (React + Vite)
  # ============================================================
  afi_frontend_nova:
    image: node:18-alpine
    container_name: afi_frontend_nova
    working_dir: /app
    volumes:
      - ./frontend-nova:/app
      - /app/node_modules  # Evita montar node_modules
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://afi_backend:8000
      - NODE_ENV=production
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # 2. BACKEND PRINCIPAL - Lógica Imagine (FastAPI)
  # ============================================================
  afi_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: afi_backend
    depends_on:
      afi_postgres:
        condition: service_healthy
      afi_qdrant:
        condition: service_started
      afi_ollama:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://afi_user:afi_pass@afi_postgres:5432/afiliaciones
      - QDRANT_URL=http://afi_qdrant:6333
      - OLLAMA_URL=http://afi_ollama:11434
      - MODEL_NAME=llama3.2:1b
      - EMBEDDING_MODEL=nomic-embed-text
      - KNOWLEDGE_DIR=/data/knowledge
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # 3. BASE DE DATOS PRINCIPAL - PostgreSQL
  # ============================================================
  afi_postgres:
    image: postgres:15-alpine
    container_name: afi_postgres
    environment:
      POSTGRES_USER: afi_user
      POSTGRES_PASSWORD: afi_pass
      POSTGRES_DB: afiliaciones
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    volumes:
      - afi_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afi_user -d afiliaciones"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 4. VECTOR STORE - Qdrant (Búsquedas semánticas)
  # ============================================================
  afi_qdrant:
    image: qdrant/qdrant:latest
    container_name: afi_qdrant
    volumes:
      - afi_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # 5. MODELO LLM LOCAL - Ollama
  # ============================================================
  afi_ollama:
    image: ollama/ollama:latest
    container_name: afi_ollama
    volumes:
      - afi_ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # 6. BACKEND COMPATIBILIDAD 926 - Motor Clone Full
  # ============================================================
  clone_full_backend:
    build:
      context: ./migracion_py_react/backend
      dockerfile: Dockerfile
    container_name: clone_full_backend
    depends_on:
      clone_full_postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://admin:admin@clone_full_postgres:5432/migracion
      - LOG_LEVEL=INFO
    volumes:
      - ./migracion_py_react/backend:/app
    ports:
      - "8011:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # 7. BASE DE DATOS COMPATIBILIDAD - PostgreSQL Clone Full
  # ============================================================
  clone_full_postgres:
    image: postgres:15-alpine
    container_name: clone_full_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: migracion
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    volumes:
      - clone_full_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d migracion"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# NETWORKS
# ============================================================
networks:
  afi_network:
    driver: bridge

# ============================================================
# VOLUMES (Datos persistentes)
# ============================================================
volumes:
  afi_postgres_data:
    driver: local
  afi_qdrant_data:
    driver: local
  afi_ollama_data:
    driver: local
  clone_full_postgres_data:
    driver: local

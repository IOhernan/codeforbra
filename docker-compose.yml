version: '3.9'

# ============================================================
# JBAFI - 7 Contenedores (Windows Desktop + Docker Desktop)
# Sistema Completo AFI en tu máquina Windows
# PUERTOS ALTERNATIVOS (evita conflictos)
# ============================================================

services:
  
  # ============================================================
  # 1. FRONTEND - Interfaz Web (React + Vite)
  # ============================================================
  afi_frontend_nova:
    image: node:18-alpine
    container_name: afi_frontend_nova
    working_dir: /app
    volumes:
      - ./frontend-nova:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    restart: unless-stopped
    networks:
      - afi_network

  # ============================================================
  # 2. BACKEND PRINCIPAL - Lógica Imagine (FastAPI)
  # ============================================================
  afi_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: afi_backend
    depends_on:
      - afi_postgres
      - afi_qdrant
      - afi_ollama
    environment:
      - DATABASE_URL=postgresql://afi_user:afi_pass@afi_postgres:5432/afiliaciones
      - QDRANT_URL=http://afi_qdrant:6333
      - OLLAMA_URL=http://afi_ollama:11434
      - MODEL_NAME=llama3.2:1b
      - EMBEDDING_MODEL=nomic-embed-text
      - KNOWLEDGE_DIR=/data/knowledge
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - afi_network

  # ============================================================
  # 3. BASE DE DATOS PRINCIPAL - PostgreSQL
  # ============================================================
  afi_postgres:
    image: postgres:15-alpine
    container_name: afi_postgres
    environment:
      POSTGRES_USER: afi_user
      POSTGRES_PASSWORD: afi_pass
      POSTGRES_DB: afiliaciones
    volumes:
      - afi_postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afi_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 4. VECTOR STORE - Qdrant (Búsquedas semánticas)
  # ============================================================
  afi_qdrant:
    image: qdrant/qdrant:latest
    container_name: afi_qdrant
    volumes:
      - afi_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    restart: unless-stopped
    networks:
      - afi_network

  # ============================================================
  # 5. MODELO LLM LOCAL - Ollama
  # ============================================================
  afi_ollama:
    image: ollama/ollama:latest
    container_name: afi_ollama
    volumes:
      - afi_ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - afi_network

  # ============================================================
  # 6. BACKEND COMPATIBILIDAD 926 - Motor Clone Full
  # ============================================================
  clone_full_backend:
    build:
      context: ./migracion_py_react/backend
      dockerfile: Dockerfile
    container_name: clone_full_backend
    depends_on:
      - clone_full_postgres
    environment:
      - DATABASE_URL=postgresql://admin:admin@clone_full_postgres:5432/migracion
    volumes:
      - ./migracion_py_react/backend:/app
    ports:
      - "8011:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - afi_network

  # ============================================================
  # 7. BASE DE DATOS COMPATIBILIDAD - PostgreSQL Clone Full
  # ============================================================
  clone_full_postgres:
    image: postgres:15-alpine
    container_name: clone_full_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: migracion
    volumes:
      - clone_full_postgres_data:/var/lib/postgresql/data
    ports:
      - "5441:5432"
    restart: unless-stopped
    networks:
      - afi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# NETWORKS
# ============================================================
networks:
  afi_network:
    driver: bridge

# ============================================================
# VOLUMES (Datos persistentes en Windows)
# ============================================================
volumes:
  afi_postgres_data:
  afi_qdrant_data:
  afi_ollama_data:
  clone_full_postgres_data:
